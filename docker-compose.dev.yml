# Development stack only — Vite dev server with bind mount for HMR.
# Usage: docker compose -f docker-compose.dev.yml up --build
# Copy .env.example to .env and set GEMINI_API_KEY before starting.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '2510:2510'
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_URL: ${APP_URL:-}
      DISABLE_HMR: ${DISABLE_HMR:-}
    stdin_open: true
    tty: true

volumes:
  web_node_modules:
